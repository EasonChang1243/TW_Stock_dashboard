name: Stock Dashboard Auto-Update

on:
  schedule:
    # 16:30 Taiwan Time is 08:30 UTC
    - cron: '30 08 * * 1-5'
  workflow_dispatch: # Enable manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install FinMind pandas requests python-dotenv tqdm

      - name: Run Fetch Data
        env:
          FIND_MY_API: ${{ secrets.FIND_MY_API }}
        run: python fetch_data.py

      - name: Commit and push if data changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.json
          git commit -m "Auto-update stock data: $(date +'%Y-%m-%d')" || exit 0
          git push

  deploy-pages:
    needs: update-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
